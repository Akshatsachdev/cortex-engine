llm:
  enabled: true
  timeout: 60

  primary_model_path: "models/qwen.gguf"
  fallback_model_path: "models/phi.gguf"

  n_ctx: 2048
  max_tokens: 160
  temperature: 0.0

gpu:
  enable: true
  n_gpu_layers: 25

secure:
  enabled: false
  password_hash: null
  allowed_paths: []

browser:
  enabled: true

  # Leave empty to allow ALL public domains.
  # If you want to restrict later, add domains here.
  allowed_domains: []

  # Optional: block specific domains explicitly (recommended to keep empty unless needed)
  blocked_domains: []

  timeout_seconds: 10
  max_bytes: 200000
  allowed_content_types:
    - text/plain
    - text/html
    - application/json
  max_redirects: 3
